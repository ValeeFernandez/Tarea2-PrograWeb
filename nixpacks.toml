[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_sqlite", "php82Extensions.sqlite3", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "composer"]

[phases.build]
cmds = [
    "composer install --no-dev",
    "touch database/database.sqlite",
    "php artisan migrate:fresh --force",
    "php artisan db:seed --force"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"